    <script>
    (function() {
        // ── Season & time detection ──
        var now = new Date();
        var month = now.getMonth(); // 0-indexed
        var hour = now.getHours();
        var dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);

        var season;
        if (month >= 2 && month <= 4) season = 'spring';
        else if (month >= 5 && month <= 7) season = 'summer';
        else if (month >= 8 && month <= 10) season = 'autumn';
        else season = 'winter';

        var timeOfDay;
        if (hour < 12) timeOfDay = 'morning';
        else if (hour < 18) timeOfDay = 'afternoon';
        else timeOfDay = 'evening';

        // ── Season greetings ──
        var seasonGreetings = {
            spring: 'The world is waking. So may you.',
            summer: 'The light is long. The mountains are open.',
            autumn: 'The year is turning. Hold it lightly.',
            winter: 'The roots are working beneath the frozen ground.'
        };

        document.getElementById('season-greeting').textContent = seasonGreetings[season];

        // ── Morning invocations (12, cycling) ──
        var morningInvocations = [
            'I woke today because others endured before me \u2014 through crossings I cannot imagine, in languages I no longer speak. I carry their survival in my body. This morning, with this tea, I remember them.',
            'The trees on my street were here before I was and may outlast me. The nearest park is exhaling right now, and I am breathing what the trees give. I am not separate from this neighborhood. I am a neighbor to all of it.',
            'This person beside me, this animal against my leg \u2014 they will not always be here, and neither will I. Let me not miss this morning by thinking about the afternoon. Let me be fully where I am, with whom I am.',
            'The sun that warms this porch has risen over this place for four and a half billion years. The hills I see were seafloor once. The tea in my hands grew from soil that was stone, that was magma, that was stardust. I am a brief visitor in an ancient story. That is enough.',
            'What season is it \u2014 not on the calendar, but in the world? What is blooming, what is dormant, what is migrating through? Let me notice the light, the temperature, the angle of the sun. My body knows what time it is if I let it.',
            'I have already received today: warmth, breath, this cup, this company. Before the day asks anything of me, let me ask what I will give back. Not out of guilt, but because exchange is how living systems endure.',
            'I do not understand why anything exists at all. I do not understand consciousness, or love, or why the light at this hour turns everything gold. I do not need to understand. Let me begin this day in honest amazement.',
            'There are countless things I could attend to today \u2014 worries that are not mine, noise that asks only to be amplified. What I give my attention to, I become. Let me choose carefully what this morning is for.',
            'I have never lived this day before and will never live it again. Whatever I think I know about how it will go, I do not. The mind that arrives at this morning without conclusions is the mind that can actually see it. Let me begin as a beginner.',
            'The river does not decide to reach the sea. The tree does not plan to grow toward light. There is a grain to things, and when I work with it, more is accomplished than when I strain against it. Today, let me notice the grain before I push.',
            'The iron in my blood was forged in a star that died before the sun was born. The calcium in my bones came from ancient seas. This body is assembled from the oldest events in the cosmos. I am not just alive \u2014 I am borrowed from deep time.',
            'Zhuangzi\u2019s cook did not cut the ox \u2014 he found the spaces already there and moved through them. The best work finds the grain of the material and follows it. Let me approach this day\u2019s labor with that kind of attention: not forcing, but following.',
            'The Stoics called it prosoche \u2014 attention to your own impulses and judgments before the day\u2019s noise arrives. What am I bringing to this morning? What mood arrived with me before I chose it? Let me notice the interior weather before I step into the world.',
            'Before the day asks anything of me, let me notice what it is already doing. The trees are already working. The birds have already begun. The light has been moving since before I woke. I arrive, as usual, late to what is already underway.',
            'This cup came from the other side of the world \u2014 from soil and rain and hands I will never know, from a tradition thousands of years old. Let me drink it slowly enough to remember that. The morning cup is a small altar. The attention I bring to it is the practice.',
            'The jacaranda on my street does not know it is in a city. The crow on the wire does not know about the freeway. I am surrounded by lives that are completely indifferent to my schedule. Let me be glad of that. The world does not need my permission to be alive.',

        ];

            {
                text: 'Do not judge your fellow until you have reached their place.',
                source: 'Hillel the Elder, Pirkei Avot 2:5'
            },
            // 57 — Jewish
            {
                text: 'The world stands on three things: on Torah, on service, and on acts of loving-kindness.',
                source: 'Shimon the Just, Pirkei Avot 1:2'
            },
            // 58 — Confucian
            {
                text: 'He who learns but does not think is lost. He who thinks but does not learn is in great danger.',
                source: 'Confucius, Analects 2:15'
            },
            // 59 — Jewish
            {
                text: 'Strive to be a person, and in a place where there are no persons, strive to be a person.',
                source: 'Hillel the Elder, Pirkei Avot 2:6'
            },
            // 60 — Jewish / wonder
            {
                text: 'Life is routine and routine is resistance to wonder.',
                source: 'Abraham Joshua Heschel, Man Is Not Alone'
            }
        ];

        // ── Evening reflections (16, cycling) ──
        var eveningReflections = [
            'What did I receive today that I did not earn? A meal someone prepared. A conversation that surprised me. The particular quality of light at a particular hour. Let me name one gift before I sleep.',
            'Which of the eight did I embody today? Which did I neglect? No judgment \u2014 just observation. Tomorrow is another attempt. The practice is in the returning.',
            'This day is over and will not come again. Whatever I did or failed to do, it is done. Let me release it as a tree releases a leaf \u2014 not in grief, but because holding on is not what living things do.',
            'Who did I love well today? Who did I fail to see? Tomorrow, let me be more present to the people and creatures who share this life with me. They are not permanent. Neither am I.',
            'The stars above this city are the same stars my ancestors navigated by, prayed under, feared and loved. The light arriving tonight left its source years or centuries ago. I am held in a web of time so vast that my anxieties, seen from that distance, are specks on the surface of an ocean.',
            'The day was full of noise. Let the night be quiet. I do not need to process every thought or solve every problem before sleep. Some things resolve themselves in rest. The roots work in the dark.',
            'My people slept in places far from here \u2014 in towns and cities I may never see, in languages some of us no longer speak. They closed their eyes not knowing what the morning would bring. I close mine in safety they struggled to make possible. I do not take this for granted.',
            'Something was difficult today. I did not expect it, or I expected it and it was worse than I thought. That difficulty was not punishment. It was texture. Let me ask what it had to teach rather than when it will stop.',
            'Was there silence today? Even a moment \u2014 in a car before turning the key, in a doorway between rooms? If so, what was in it? If not, let this be the first quiet of the day. It is not too late for stillness.',
            'My body carried everything today: the anxiety, the exertion, the laughter, the hours at a screen. It deserves acknowledgment. Tonight, let me feel it rather than ignore it. The body remembers what the mind prefers to skip.',
            'I spoke with someone today. Did I hear them? Did I let their words land before forming my response, or was I already somewhere else? The people around me are entire worlds. Let me try again tomorrow to actually enter one.',
            'What is the world doing tonight that it was not doing a month ago? The light is different. Something is blooming or dormant or migrating. The year is in a particular phase and I am living through it. Let me be aware of what season I am actually in.',
            'What did I learn today that I did not know this morning? Even one thing. Even small. The day that teaches nothing has been given too little attention. Tomorrow I will look more carefully.',
            'What went unnoticed today that deserved to be seen? The person behind me in line. The plant on the windowsill. The way the afternoon light moved across the wall. Something was happening that I missed. Let me be less absent tomorrow.',
            'My body carried me everywhere today, without being asked. It handled more than I noticed. Tonight, before sleep, let me feel it \u2014 not the things still undone, not tomorrow\u2019s list, but the actual weight and warmth of this body that has been carrying me all my life.',
            'Somewhere tonight, in languages I do not speak, people I will never meet are asking themselves the same questions \u2014 what did I do, what could I have done better, what do I carry forward? The examined life is not a solitary project. I am not alone in this.'
        ];

        // ── Select today's content ──
        var morningIndex = dayOfYear % morningInvocations.length;
        var readingIndex = dayOfYear % canonReadings.length;
        var eveningIndex = dayOfYear % eveningReflections.length;

        document.getElementById('morning-text').textContent = morningInvocations[morningIndex];
        document.getElementById('reading-text').textContent = canonReadings[readingIndex].text;
        document.getElementById('reading-source').textContent = '\u2014 ' + canonReadings[readingIndex].source;
        document.getElementById('evening-text').textContent = eveningReflections[eveningIndex];

        // ── "now" indicator ──
        // Use insertAdjacentHTML so existing button DOM nodes are not destroyed.
        var nowLabel = '<span style="font-family: var(--font-ui); font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--lichen); vertical-align: middle; margin-left: 0.5em;">now</span>';

        if (timeOfDay === 'morning') {
            document.getElementById('morning-heading').insertAdjacentHTML('beforeend', nowLabel);
        } else if (timeOfDay === 'afternoon') {
            document.getElementById('reading-heading').insertAdjacentHTML('beforeend', nowLabel);
        } else {
            document.getElementById('evening-heading').insertAdjacentHTML('beforeend', nowLabel);
        }

        // ── Shuffle buttons ──
        function fadeSwap(el, fn) {
            el.style.transition = 'opacity 0.25s';
            el.style.opacity = '0';
            setTimeout(function() {
                fn();
                el.style.opacity = '1';
            }, 200);
        }

        document.querySelectorAll('.shuffle-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var section = this.dataset.section;
                var arr, currentIdx;

                if (section === 'morning') {
                    arr = morningInvocations;
                    currentIdx = morningIndex;
                } else if (section === 'reading') {
                    arr = canonReadings;
                    currentIdx = readingIndex;
                } else {
                    arr = eveningReflections;
                    currentIdx = eveningIndex;
                }

                var newIdx;
                do {
                    newIdx = Math.floor(Math.random() * arr.length);
                } while (newIdx === currentIdx && arr.length > 1);

                if (section === 'morning') {
                    morningIndex = newIdx;
                    var el = document.getElementById('morning-text');
                    fadeSwap(el.parentElement, function() {
                        el.textContent = arr[newIdx];
                    });
                } else if (section === 'reading') {
                    readingIndex = newIdx;
                    var readEl = document.getElementById('reading-text');
                    var srcEl = document.getElementById('reading-source');
                    readEl.style.transition = 'opacity 0.25s';
                    srcEl.style.transition = 'opacity 0.25s';
                    readEl.style.opacity = '0';
                    srcEl.style.opacity = '0';
                    setTimeout(function() {
                        readEl.textContent = arr[newIdx].text;
                        srcEl.textContent = '\u2014 ' + arr[newIdx].source;
                        readEl.style.opacity = '1';
                        srcEl.style.opacity = '1';
                    }, 200);
                } else {
                    eveningIndex = newIdx;
                    var eveEl = document.getElementById('evening-text');
                    fadeSwap(eveEl.parentElement, function() {
                        eveEl.textContent = arr[newIdx];
                    });
                }
            });
        });

    })();
    </script>
    <script src="src/js/main.js"></script>
</body>
</html>
